# Minimal story output template (from docs/story-creation.md)
story_metadata:
  topic: "string"
  source_research: "output/<topic>_<timestamp>/research.md"
  created_at: "ISO8601"
  pattern_used: "hidden_truth|counterintuitive|mystery|hero|emotional"

# Creative selection（推奨: 複数案→選択）
#
# 目的:
# - “創造”で多様性を出し、“選択”でスコアが高い案を採用する。
# - Hero's Journey への当てはめは必須ではない（フレームワークは道具）。
selection:
  candidates:
    - candidate_id: "A"
      logline: "string"
      why_it_scores: ["string"]
      score_hint:
        engagement: 0.0
        coherence: 0.0
        production_fit: 0.0
      requires_hybridization_approval: false
      conflicts_referenced: ["research.conflicts[C1]"]
    - candidate_id: "B"
      logline: "string"
      why_it_scores: ["string"]
      score_hint:
        engagement: 0.0
        coherence: 0.0
        production_fit: 0.0
      requires_hybridization_approval: false
      conflicts_referenced: []
  chosen_candidate_id: "A"
  rationale: "string"

# Hybridization approval gate（混成する場合は承認必須・運用）
hybridization:
  approval_status: "not_needed|pending|approved|rejected"
  proposal:
    summary: "string"
    conflicts_referenced: ["research.conflicts[C1]"]
    mix_elements: ["string"]
    risks: ["string"]
    mitigations: ["string"]
    question_for_user: "このハイブリッド（混成）で進めてよいですか？"

story_structure:
  protagonist:
    name: "string"
    role: "string"
    source_node_id: "string"
  journey:
    ordinary_world:
      description: "string"
    ordeal:
      challenge: "string"
    transformation:
      before: "string"
      after: "string"
    return:
      resolution: "string"
  theme:
    governing_thought: "string"

script:
  scenes:
    - scene_id: 1
      phase: "opening|development|ordeal|transformation|ending"
      narration: "string"
      visual: "string"
      # Mapping back to research for traceability (運用: idが無い場合は短い引用でも可)
      research_refs: ["research.engagement.hooks[0]", "research.story_baseline.beat_sheet[0]"]
    - scene_id: 2
      phase: "opening|development|ordeal|transformation|ending"
      narration: "string"
      visual: "string"
      research_refs: []

engagement_design:
  primary_hook:
    type: "string"
    content: "string"
    position_percent: 0

quality_scores:
  engagement_potential: 0.0
  information_accuracy: 0.0

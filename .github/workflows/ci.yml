name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  fast-lane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            uv pip install --system --requirement requirements.txt
          fi

      - name: Compile check
        run: python -m compileall .

      - name: Validate pointer docs
        run: python scripts/validate-pointer-docs.py

      - name: Fast lane tests
        run: |
          python -m pytest -q \
            tests/test_pointer_docs.py \
            tests/test_toc_state_script.py \
            tests/test_toc_run_scaffold.py \
            tests/test_toc_immersive_ride_scaffold.py \
            tests/test_verify_pipeline.py

  full-lane:
    runs-on: ubuntu-latest
    needs: fast-lane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            uv pip install --system --requirement requirements.txt
          fi

      - name: Full test suite
        run: python -m pytest -q

      - name: Golden topic dry-runs
        run: |
          tmp_dir="$(mktemp -d)"
          python scripts/toc-run.py "桃太郎" --dry-run --timestamp 20990101_0000 --base "$tmp_dir" --force
          python scripts/toc-scene-series.py "竹取物語" --dry-run --timestamp 20990101_0001 --base "$tmp_dir" --force
          python scripts/toc-immersive-ride.py --topic "浦島太郎" --timestamp 20990101_0002 --base "$tmp_dir" --force

      - name: Placeholder smoke renders
        run: |
          tmp_dir="$(mktemp -d)"
          python scripts/toc-scene-series.py "桃太郎" --timestamp 20990101_0003 --base "$tmp_dir" --placeholder-e2e --force

          python scripts/toc-immersive-ride.py --topic "竹取物語" --timestamp 20990101_0004 --base "$tmp_dir" --force
          run_dir="$tmp_dir/竹取物語_20990101_0004"
          python scripts/generate-placeholder-assets.py --manifest "$run_dir/video_manifest.md" --force
          python scripts/build-clip-lists.py --manifest "$run_dir/video_manifest.md" --out-dir "$run_dir"
          scripts/render-video.sh \
            --clip-list "$run_dir/video_clips.txt" \
            --narration-list "$run_dir/video_narration_list.txt" \
            --out "$run_dir/video.mp4"
          python scripts/toc-state.py append --run-dir "$run_dir" \
            --set "runtime.render.status=success" \
            --set "artifact.video=$run_dir/video.mp4" \
            --set "review.video.status=pending"
          python scripts/verify-pipeline.py --run-dir "$run_dir" --flow immersive --profile fast
